controller_manager:
  ros__parameters:
    update_rate: 500
    ur_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

ur_arm_controller:
  ros__parameters:
    joints:
      - ur5e_shoulder_pan_joint
      - ur5e_shoulder_lift_joint
      - ur5e_elbow_joint
      - ur5e_wrist_1_joint
      - ur5e_wrist_2_joint
      - ur5e_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity